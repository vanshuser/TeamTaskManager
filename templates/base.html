<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Task Manager</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        font-family:'Poppins',sans-serif;
        min-height:100vh;
        overflow-x:hidden;

        background:
        linear-gradient(
        135deg,
        #0f0f0f,
        #1a1a1a,
        #111111);

        position:relative;
    }

    .circle{
        position:absolute;
        border-radius:50%;
        filter:blur(80px);
        opacity:0.5;
    }

    .circle1{
        width:350px;
        height:350px;
        background:#ff6b00;
        top:-120px;
        left:-120px;
    }

    .circle2{
        width:350px;
        height:350px;
        background:#ff0080;
        bottom:-120px;
        right:-120px;
    }

    .navbar{
        background:rgba(255,255,255,0.05);
        backdrop-filter:blur(14px);
        border-bottom:1px solid rgba(255,255,255,0.08);
    }

    .navbar-brand{
        font-size:30px;
        font-weight:700;
        color:white !important;
        letter-spacing:1px;
    }

    .glass-card{
        background:rgba(255,255,255,0.06);
        border:1px solid rgba(255,255,255,0.08);
        backdrop-filter:blur(18px);
        border-radius:30px;
        box-shadow:
        0 0 30px rgba(255,107,0,0.15),
        0 0 60px rgba(255,0,128,0.12);

        color:white;
        transition:0.4s;
    }

    .glass-card:hover{
        transform:translateY(-6px);
    }

    .main-title{
        font-size:42px;
        font-weight:700;
        text-align:center;
        margin-bottom:10px;
        color:white;
    }

    .sub-title{
        text-align:center;
        color:#cfcfcf;
        margin-bottom:35px;
    }

    label{
        margin-top:12px;
        margin-bottom:6px;
        font-weight:500;
        color:#f1f1f1;
    }

    .form-control,
    .form-select{
        background:rgba(255,255,255,0.08);
        border:none;
        border-radius:14px;
        color:white;
        padding:14px;
    }

    .form-control:focus,
    .form-select:focus{
        background:rgba(255,255,255,0.12);
        color:white;
        box-shadow:none;
        border:1px solid #ff6b00;
    }

    .form-control::placeholder{
        color:#d8d8d8;
    }

    .btn-modern{
        background:linear-gradient(
        to right,
        #ff6b00,
        #ff0080);

        border:none;
        border-radius:14px;
        padding:14px;
        font-weight:600;
        font-size:16px;
        transition:0.3s;
        color:white;
    }

    .btn-modern:hover{
        transform:scale(1.03);
        opacity:0.95;
        box-shadow:
        0 0 20px rgba(255,107,0,0.5),
        0 0 30px rgba(255,0,128,0.4);
    }

    .bottom-text{
        text-align:center;
        margin-top:25px;
        color:#d1d1d1;
    }

    .bottom-text a{
        color:#ff8c42;
        text-decoration:none;
        font-weight:600;
    }

    .bottom-text a:hover{
        color:#ff0080;
    }

    .btn-outline-light{
        border-radius:12px;
        border:1px solid rgba(255,255,255,0.3);
    }

    .btn-outline-light:hover{
        background:#ff6b00;
        border-color:#ff6b00;
    }

    .btn-info{
        background:linear-gradient(
        to right,
        #ff6b00,
        #ff0080);

        border:none;
        border-radius:12px;
    }

    .btn-info:hover{
        opacity:0.9;
    }

</style>

</head>

<body>

    <div class="circle circle1"></div>
    <div class="circle circle2"></div>

    <nav class="navbar navbar-expand-lg py-3">

        <div class="container">

            <a class="navbar-brand" href="#">
                <i class="bi bi-kanban-fill"></i>
                Team Task Manager
            </a>

            <div class="d-flex gap-2">

    <a href="/dashboard/"
    class="btn btn-outline-light">

        Dashboard

    </a>

    <a href="/projects/"
    class="btn btn-outline-light">

        Projects

    </a>

    <a href="/tasks/"
    class="btn btn-outline-light">

        Tasks

    </a>

{% if user.is_authenticated %}

<li class="nav-item">
    <a class="btn btn-danger px-3" href="{% url 'logout' %}">
        Logout
    </a>
</li>

{% else %}

<li class="nav-item">
    <a class="btn btn-success px-3" href="{% url 'login' %}">
        Login
    </a>
</li>

{% endif %}

</div>

        </div>

    </nav>

    <div class="container py-5">

        {% block content %}

        {% endblock %}

    </div>

</body>
</html>
