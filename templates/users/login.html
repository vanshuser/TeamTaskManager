{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center align-items-center">

    <div class="col-lg-5 col-md-7">

        <div class="glass-card p-5">

            <h1 class="main-title">
                Welcome Back
            </h1>

            <p class="sub-title">
                Login to continue managing tasks
            </p>

            <form method="POST">

                {% csrf_token %}

                {{ form.as_p }}

                <button type="submit"
                class="btn btn-modern w-100 text-white mt-3">

                    <i class="bi bi-box-arrow-in-right"></i>
                    Login

                </button>

            </form>

            <div class="bottom-text">

                Don't have an account?

                <a href="/signup/">
                    Signup
                </a>

            </div>

        </div>

    </div>

</div>

{% endblock %}
