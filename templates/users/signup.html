{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center align-items-center">

    <div class="col-lg-5 col-md-7">

        <div class="glass-card p-5">

            <h1 class="main-title">
                Create Account
            </h1>

            <p class="sub-title">
                Manage projects & tasks efficiently
            </p>

            <form method="POST">

                {% csrf_token %}

                {{ form.as_p }}

                <button type="submit"
                class="btn btn-modern w-100 text-white mt-3">

                    <i class="bi bi-person-plus-fill"></i>
                    Signup

                </button>

            </form>

            <div class="bottom-text">

                Already have an account?

                <a href="/login/">
                    Login
                </a>

            </div>

        </div>

    </div>

</div>

{% endblock %}
