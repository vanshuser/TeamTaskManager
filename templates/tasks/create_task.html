{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-7">

        <div class="glass-card p-3 p-md-5">

            <h1 class="main-title">
                Create Task
            </h1>

            <form method="POST">

                {% csrf_token %}

                {{ form.as_p }}

                <button type="submit"
                class="btn btn-modern w-100 mt-3">

                    Create Task

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
